<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Digital Business Card</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff}
.container{max-width:420px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);padding:25px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.profile{width:110px;height:110px;border-radius:50%;border:4px solid #fff;margin-bottom:15px}
h1{font-size:22px}
p{opacity:.8;margin:5px 0 15px}
.btn{display:block;margin:8px 0;padding:12px;border-radius:12px;text-decoration:none;color:#fff;font-weight:bold;transition:.3s;border:none;cursor:pointer}
.btn:hover{transform:scale(1.05)}
.fb{background:#1877f2}.ig{background:#e1306c}.li{background:#0077b5}.wa{background:#25d366}.web{background:#ff9800}.call{background:#673ab7}.mail{background:#f44336}.pdf{background:#009688}
.section{margin-top:20px}
.gallery img{width:100%;border-radius:12px;margin-top:10px}
.qr{margin-top:15px}
.footer{margin-top:15px;font-size:12px;opacity:.6}

/* PRINT STYLE FOR PDF */
@media print {
 body{background:#fff;color:#000}
 .btn{display:none}
 .card{box-shadow:none;background:#fff;color:#000}
}
</style>
</head>

<body>
<div class="container" id="cardArea">

<div class="card">
<img src="https://images.unsplash.com/photo-1502767089025-6572583495b0" class="profile">
<h1>Your Name</h1>
<p>CEO | Smart Business</p>

<a href="tel:+8801234567890" class="btn call">📞 Call Me</a>
<a href="mailto:email@example.com" class="btn mail">📧 Email Me</a>

<a href="https://facebook.com" target="_blank" class="btn fb">Facebook</a>
<a href="https://instagram.com" target="_blank" class="btn ig">Instagram</a>
<a href="https://linkedin.com" target="_blank" class="btn li">LinkedIn</a>
<a href="https://wa.me/8801234567890" target="_blank" class="btn wa">WhatsApp</a>
<a href="#website" class="btn web">My Website</a>

<!-- PDF SAVE BUTTON -->
<button class="btn pdf" onclick="savePDF()">📄 Save as PDF</button>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://yourwebsite.com" alt="QR Code">
<p>Scan QR</p>
</div>
</div>

<div id="website" class="section card">
<h2>🌐 My Website</h2>
<p>This is your mini mobile website section.</p>
</div>

<div class="section card gallery">
<h2>📸 Gallery</h2>
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>

<div class="footer">
<p>© 2026 Your Brand</p>
</div>

</div>

<script>
// PDF SAVE FUNCTION
function savePDF(){
 window.print();
}

// smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(a=>{
 a.addEventListener('click',function(e){
  e.preventDefault();
  document.querySelector(this.getAttribute('href')).scrollIntoView({behavior:'smooth'});
 })
});

// greeting popup
setTimeout(()=>{
 alert("Welcome to your Digital Card 🚀");
},1000);
</script>

</body>
</html>
